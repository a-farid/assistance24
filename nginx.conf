    # Frontend Router inside nginx.conf
    server {
        listen 80;
        server_name app.dev.local;

        # Standard web asset and page delivery mapping
        location / {
            proxy_pass http://assistance24-frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # CRITICAL: WebSocket Ingress Channel for Next.js Fast Refresh / HMR
        location /_next/webpack-hmr {
            proxy_pass http://assistance24-frontend:3000/_next/webpack-hmr;
            
            # Force the HTTP connection protocol to version 1.1 (Required for upgrades)
            proxy_http_version 1.1;
            
            # Dynamically pass downstream protocol alteration headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard infrastructure metadata tracing
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Disable caching loops for continuous streaming
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Backend API Router
    server {
        listen 80;
        server_name api.dev.local;

        location / {
            proxy_pass http://assistance24-backend:8000; # Explicit container name
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}