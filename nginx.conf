events { worker_connections 1024; } # <-- Added crucial missing semicolon

http {
    # Frontend Router
    server {
        listen 80;
        server_name app.dev.local;

        location /api/ {
            proxy_pass http://assistance24-backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://assistance24-frontend:3000; # Explicit container name
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Backend API Router
    server {
        listen 80;
        server_name api.dev.local;

        location / {
            proxy_pass http://assistance24-backend:8000; # Explicit container name
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}